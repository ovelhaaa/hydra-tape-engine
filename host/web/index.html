<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hydra DSP Web Demo</title>
    <style>
      body { font-family: system-ui, sans-serif; background: #111; color: #eee; margin: 0; padding: 1rem; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1rem; }
      .card { background: #1c1c1c; border: 1px solid #333; border-radius: 8px; padding: 1rem; }
      label { display: block; margin: 0.5rem 0; font-size: 0.9rem; }
      input[type="range"] { width: 100%; }
      button { margin: 0.2rem 0.2rem 0.2rem 0; }
      .repeat-toggle--active { background: #2d7d46; color: #fff; border: 1px solid #6fe294; }
      #status { color: #9ad; min-height: 1.2rem; }
      audio { width: 100%; }
      .panel-header { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
      .pill { font-size: 0.75rem; padding: 0.15rem 0.5rem; border-radius: 999px; border: 1px solid #666; color: #ccc; }
      .pill--active { background: #2d7d46; border-color: #6fe294; color: #fff; }
      .meta { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
      .value { color: #9ad; float: right; }
      table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
      th, td { border-bottom: 1px solid #2e2e2e; text-align: left; padding: 0.25rem 0.2rem; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      #latencyReport { margin-top: 0.5rem; color: #9ad; min-height: 1rem; font-size: 0.85rem; }
    </style>
  </head>
  <body>
    <h1>Hydra DSP Web (WASM + AudioWorklet)</h1>
    <p id="status">Loading…</p>

    <div class="grid">
      <section class="card">
        <h2>Transport</h2>
        <input id="fileInput" type="file" accept="audio/*" />
        <audio id="player" controls></audio>
        <div>
          <button id="startBtn">Start Audio</button>
          <button id="playBtn">Play</button>
          <button id="stopBtn">Stop</button>
          <button id="repeatBtn" aria-pressed="false">Repeat OFF</button>
          <button id="connectBtn">Connect FX</button>
          <button id="bypassBtn">Bypass: OFF</button>
          <button id="resetBtn">Reset DSP</button>
          <button id="offlineBtn">Render Offline</button>
          <a id="downloadLink" style="display:none" download="hydra-offline.wav">Download offline WAV</a>
        </div>
      </section>

      <section class="card">
        <div class="panel-header">
          <h2>Main Params</h2>
          <span id="previewBadge" class="pill">Preview inativo</span>
        </div>
        <div class="meta">
          <span id="perfBadge" class="pill">Fallback visual: OFF</span>
        </div>
        <label>Delay Active <input id="delayActive" type="checkbox" checked></label>
        <label>Delay Time (ms) <span class="value mono" data-value-for="delayTimeMs">500</span><input id="delayTimeMs" type="range" min="10" max="2000" value="500"></label>
        <label>Feedback <span class="value mono" data-value-for="feedback">40</span><input id="feedback" type="range" min="0" max="100" value="40"></label>
        <label>Dry/Wet <span class="value mono" data-value-for="dryWet">50</span><input id="dryWet" type="range" min="0" max="100" value="50"></label>
        <label>Drive <span class="value mono" data-value-for="drive">40</span><input id="drive" type="range" min="0" max="100" value="40"></label>
        <label>Flutter Depth <span class="value mono" data-value-for="flutterDepth">20</span><input id="flutterDepth" type="range" min="0" max="100" value="20"></label>
        <label>Wow Depth <span class="value mono" data-value-for="wowDepth">15</span><input id="wowDepth" type="range" min="0" max="100" value="15"></label>
        <button id="latencyCheckBtn">Validar latência/estabilidade</button>
        <div id="latencyReport"></div>
      </section>

      <section class="card">
        <h2>Mapeamento de parâmetros</h2>
        <table>
          <thead>
            <tr><th>Controle</th><th>Grupo</th><th>ID</th><th>Camada</th><th>Default</th></tr>
          </thead>
          <tbody id="paramMapTableBody"></tbody>
        </table>
      </section>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
