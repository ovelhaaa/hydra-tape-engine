; ARQUIVO: Multi-head-tape-delay-mp3-processor/platformio.ini
; Configuração para YD-ESP32-S3 (N16R8) - Serial CLI Version

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; --- VELOCIDADE ---
board_build.f_cpu = 240000000L
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; --- MEMÓRIA (Configuração Específica para N16R8) ---
; N16 = 16MB Flash
; R8 = 8MB PSRAM (Octal/OPI)
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi

; --- SISTEMA DE ARQUIVOS ---
board_build.filesystem = littlefs
board_build.partitions = partitions.csv

; --- FLAGS DE COMPILAÇÃO ---
build_flags = 
    ; Habilita PSRAM
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    
    ; CONFIGURAÇÃO USB:
    ; Mode 1 = Hardware CDC (USB Serial/JTAG Controller)
    -DARDUINO_USB_MODE=1
    ; CDC On Boot = 1 envia o Serial.print para a porta USB Nativa
    -DARDUINO_USB_CDC_ON_BOOT=1
    
    ; CORREÇÃO DE LINKER (Resolve o erro "multiple definition"):
    -Wl,--allow-multiple-definition
    
    ; Core dump support
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ESP32_ENABLE_COREDUMP_TO_FLASH=y
    -DCONFIG_I2S_SUPPRESS_DEPRECATE_WARN
    
    ; OPTIMIZATIONS
    -Ofast
    -ffast-math
    -funroll-loops

; --- CORREÇÃO DE BIBLIOTECA ---
; Impede a criação de arquivos .a, forçando o linker a resolver conflitos
lib_archive = no

lib_deps =
    earlephilhower/ESP8266Audio @ ^1.9.7
    adafruit/Adafruit SSD1306 @ ^2.5.10
    adafruit/Adafruit GFX Library @ ^1.11.9

; ============================================
; NATIVE TEST ENVIRONMENT (Unit Tests on PC)
; ============================================
[env:native]
platform = native
test_framework = unity
test_filter = test_native/*
; Do NOT build src/ folder - tests are standalone
build_src_filter = -<*>
build_flags = 
    -DUNITY_INCLUDE_DOUBLE
    -std=c++14
    -DNATIVE_TEST
    -I test/test_native
lib_compat_mode = off
; Ignore all project libraries - tests are self-contained
lib_ignore = 
    TapeDelay
    MelodyGen
    Frippertronics-Core
    ESP8266Audio
lib_deps =
test_build_src = false
